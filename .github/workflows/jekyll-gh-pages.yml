name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["master", "main"] # 你的主分支叫什么就写什么

  # 允许在 Actions 页面手动触发构建
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' # 指定稳定的 Ruby 版本
          bundler-cache: true # 自动缓存依赖，加速构建

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        # 使用 bundle exec 自动根据你项目里的 Gemfile 独立编译，彻底避开官方平台的依赖冲突
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.baseurl }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
